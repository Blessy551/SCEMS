<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCEMS Events</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-primary navbar-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="#">SCEMS Events</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#publicNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="publicNavbar">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#upcoming-section">Events</a></li>
        </ul>
        <a class="btn btn-light btn-sm" href="http://localhost:5173/login">Login</a>
      </div>
    </div>
  </nav>

  <header class="hero py-5 border-bottom">
    <div class="container">
      <h1 class="display-6 fw-bold mb-2">Discover Campus Events</h1>
      <p class="text-muted mb-0">Browse approved and published SCEMS events without login.</p>
    </div>
  </header>

  <main class="container py-4">
    <section class="filters card border-0 shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-4">
            <label for="searchInput" class="form-label">Search by title</label>
            <input id="searchInput" type="text" class="form-control" placeholder="e.g. Hackathon">
          </div>
          <div class="col-md-4">
            <label for="categoryFilter" class="form-label">Filter by category</label>
            <select id="categoryFilter" class="form-select">
              <option value="">All categories</option>
            </select>
          </div>
          <div class="col-md-4">
            <label for="dateFilter" class="form-label">Filter by date</label>
            <input id="dateFilter" type="date" class="form-control">
          </div>
        </div>
      </div>
    </section>

    <div id="loadingState" class="text-center py-5">
      <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
      <p class="mt-3 text-muted mb-0">Loading events...</p>
    </div>

    <div id="errorState" class="alert alert-danger d-none" role="alert"></div>
    <div id="emptyState" class="alert alert-info d-none">No events available.</div>

    <section id="upcoming-section" class="mb-5 d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">Upcoming Events</h2>
      </div>
      <div id="upcomingEvents" class="row g-4"></div>
    </section>

    <section id="past-section" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h4 mb-0">Past Events</h2>
      </div>
      <div id="pastEvents" class="row g-4"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
